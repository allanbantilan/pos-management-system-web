[deploy]
startCommand = "sh -c 'if [ \"$MIGRATE_ON_START\" = \"true\" ]; then php artisan migrate --force; fi && php artisan config:clear && php artisan route:clear && php artisan view:clear && php artisan cache:clear && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan storage:link || true; php artisan serve --host=0.0.0.0 --port=$PORT'"